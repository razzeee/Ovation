services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ovation
      POSTGRES_USER: ovation
      POSTGRES_PASSWORD: ovationpasswd
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovation"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://ovation:ovationpasswd@db:5432/ovation
      JWT_SECRET: change-me-to-a-secure-random-string
      REVIEWS_SECRET: change-me-to-a-secure-random-string
      SENTRY_DSN: ""
      NODE_ENV: production
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
